<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevVault - Snippet Manager</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>&#128187; DevVault</h1>
            <p class="subtitle">Il tuo archivio personale di snippet di codice</p>
        </header>

        <!-- Form -->
        <section class="form-section">
            <form id="snippetForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Titolo *</label>
                        <input type="text" id="title" name="title" placeholder="Es: CRUD con PDO" required>
                    </div>
                    <div class="form-group">
                        <label for="language">Linguaggio</label>
                        <select id="language" name="language">
                            <option value="PHP">PHP</option>
                            <option value="JavaScript">JavaScript</option>
                            <option value="Python">Python</option>
                            <option value="HTML">HTML</option>
                            <option value="CSS">CSS</option>
                            <option value="SQL">SQL</option>
                            <option value="Java">Java</option>
                            <option value="C#">C#</option>
                            <option value="Ruby">Ruby</option>
                            <option value="Go">Go</option>
                            <option value="Rust">Rust</option>
                            <option value="TypeScript">TypeScript</option>
                            <option value="Other">Altro</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="code">Codice *</label>
                    <textarea id="code" name="code" rows="6" placeholder="Incolla il tuo codice qui..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="notes">Descrizione *</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="Descrivi a cosa serve questo snippet..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">Salva Snippet</span>
                </button>
            </form>
        </section>

        <!-- Snippets List -->
        <section class="snippets-section">
            <h2>Snippet salvati</h2>
            <div id="snippetsList">
                <p class="loading">Caricamento snippet in corso...</p>
            </div>
        </section>
    </div>

    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>
</html>
